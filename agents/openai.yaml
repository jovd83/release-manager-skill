interface:
  display_name: "GitHub Release Manager"
  short_description: "Validate and prepare GitHub release commits safely"
  brand_color: "#0F4C81"
  default_prompt: "Use $release-manager-skill to verify a GitHub repository, validate CHANGELOG.md coverage, prepare the correct version bump, and leave the repo ready for the next Unreleased cycle."

policy:
  allow_implicit_invocation: true
